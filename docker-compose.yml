version: '3.8'

services:
  typesense:
    image: typesense/typesense:26.0
    container_name: hospital-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    environment:
      # API Key for authentication
      - TYPESENSE_API_KEY=hospital_typesense_secret_key_2024
      # Data directory
      - TYPESENSE_DATA_DIR=/data
    command: >
      --data-dir /data 
      --api-key=hospital_typesense_secret_key_2024 
      --enable-cors
      --log-slow-requests-time-ms=1000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8108/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge

volumes:
  typesense-data:
    driver: local
